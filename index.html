<style>
*{box-sizing:border-box;margin:0;padding:0}
body{margin:0;background:#030409}
::selection{background:rgba(226,192,116,0.25)}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:3px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes orbFloat{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(20px,-30px) scale(1.05)}66%{transform:translate(-15px,15px) scale(0.95)}}
@keyframes scaleIn{from{opacity:0;transform:scale(0.96)}to{opacity:1;transform:scale(1)}}
@keyframes shakeX{0%,100%{transform:translateX(0)}10%,30%,50%,70%,90%{transform:translateX(-6px)}20%,40%,60%,80%{transform:translateX(6px)}}
@keyframes particleFloat{0%{transform:translateY(0) rotate(0deg);opacity:0.6}50%{opacity:1}100%{transform:translateY(-120px) rotate(180deg);opacity:0}}
@keyframes hexGlow{0%,100%{filter:drop-shadow(0 0 8px rgba(226,192,116,0.3))}50%{filter:drop-shadow(0 0 20px rgba(226,192,116,0.6))}}
.comparison-table{width:100%;border-collapse:separate;border-spacing:0;border-radius:12px;overflow:hidden;margin:16px 0;font-size:13px}
.comparison-table th{padding:12px 16px;text-align:left;font-family:'Sora',sans-serif;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:0.08em}
.comparison-table td{padding:10px 16px;border-top:1px solid var(--border-line,rgba(255,255,255,0.06))}
.comparison-table tr:hover td{background:rgba(226,192,116,0.04)}
.pill-green{background:rgba(74,222,128,0.15);color:#4ade80;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;font-family:'JetBrains Mono',monospace;display:inline-block}
.pill-yellow{background:rgba(250,204,21,0.15);color:#facc15;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;font-family:'JetBrains Mono',monospace;display:inline-block}
.pill-red{background:rgba(252,165,165,0.15);color:#fca5a5;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;font-family:'JetBrains Mono',monospace;display:inline-block}
.pill-blue{background:rgba(96,165,250,0.15);color:#60a5fa;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;font-family:'JetBrains Mono',monospace;display:inline-block}
.pill-purple{background:rgba(192,132,252,0.15);color:#c084fc;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;font-family:'JetBrains Mono',monospace;display:inline-block}
.search-chip{display:inline-flex;align-items:center;padding:5px 12px;border-radius:999px;font-size:12px;cursor:pointer;transition:all 0.2s;border:1px solid rgba(255,255,255,0.06);background:rgba(255,255,255,0.03)}
.search-chip:hover{border-color:rgba(226,192,116,0.3);background:rgba(226,192,116,0.06);color:#e2c074}
.match-badge{display:inline-flex;align-items:center;padding:1px 6px;border-radius:4px;font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;font-family:'JetBrains Mono',monospace}
</style>
</head>

    cards:[
      {
        title:"O que é RAG? A Dupla Dinâmica da IA",subtitle:"Quando um gênio e um bibliotecário trabalham juntos.",level:"iniciante",icon:"brain",
        analogy:{tag:"Analogia do Dia a Dia",text:"Imagine um **estudante brilhante** que escreve textos lindos, mas às vezes inventa fatos. Agora imagine um **bibliotecário meticuloso** que encontra qualquer informação em segundos. Sozinhos, cada um tem limitações. Mas juntos? O bibliotecário busca os dados certos é o estudante escreve a resposta perfeita. Isso é RAG: a união do Recuperador (bibliotecário) com o Gerador (estudante)."},
        content:`**RAG** significa **Retrieval-Augmented Generation** (Geração Aumentada por Recuperação). Em português simples: é uma técnica que faz a inteligência artificial buscar informações reais antes de responder você.

**Por que isso importa?**

Modelos de linguagem (como ChatGPT, Gemini, Claude) são incrivelmente inteligentes, mas tem um problema: eles foram treinados com dados até uma certa data. Após isso, não sabem nada. Além disso, podem inventar respostas que parecem verdadeiras mas são falsas. Isso se chama **alucinação** (hallucination).

**Como o RAG resolve isso?**

O RAG adiciona uma etapa antes de gerar a resposta: ele **busca documentos relevantes** numa base de conhecimento e entrega esses documentos ao modelo. Assim, o modelo responde baseado em fatos reais, não em memória.

**O fluxo básico do RAG:**

1. Você faz uma pergunta.
2. O sistema busca documentos relevantes (Recuperação).
3. Os documentos encontrados são adicionados ao prompt (Aumento).
4. O modelo gera a resposta usando esses documentos (Geração).`,

        title:"Por que o RAG Existe? O Problema das Alucinações",subtitle:"Quando a IA inventa respostas que parecem verdadeiras.",level:"iniciante",icon:"alertTriangle",
        analogy:{tag:"Analogia Simples",text:"Imagine um **ator talentoso** que decorou centenas de roteiros. Se você pedir para ele improvisar uma cena sobre historia do Brasil, ele pode misturar falas de filmes diferentes e criar algo que **parece** real mas **nao e**. Modelos de IA fazem isso: misturam padrões do treinamento e geram respostas convincentes, porem incorretas."},
        content:`**O problema central:** Modelos de linguagem grandes (LLMs) não sabem distinguir entre o que sabem de verdade é o que estao inventando. Eles geram texto com extrema confiança, mesmo quando a informação é falsa.

**Exemplos de alucinações reais:**

- Um LLM citou um artigo científico que nunca existiu, com autor, revista e ano inventados.
- Outro gerou uma receita de bolo com ingredientes que não combinam, como se fosse uma receita famosa.
- Um chatbot jurídico inventou leis e precedentes que não existem no código brasileiro.

**Por que isso acontece?**

Os LLMs são treinados para prever a proxima palavra mais provavel. Eles não tem acesso a internet em tempo real, não consultam bancos de dados e não verificam fatos. Eles apenas geram texto que parece coerente.

**Como o RAG resolve?**

O RAG obriga o modelo a basear suas respostas em documentos reais que foram buscados especificamente para aquela pergunta. Em vez de confiar na memória do modelo, confiamos em fontes verificáveis.`,

        tips:["Alucinação não é um bug - é uma caracteristica dos LLMs. RAG é a solução prática.","Quanto mais específico o dominio (jurídico, médico), mais perigosas são as alucinações.","RAG reduz alucinações drasticamente, mas não as elimina 100%. Sempre valide respostas criticas."],

        analogy:{tag:"Analogia da Construção",text:"**RAG** é como **mobiliar um apartamento**: você compra moveis (dados), organiza como quer e pode trocar a qualquer momento. E rápido, barato e reversível. **Fine-Tuning** é como **reformar a fundação do prédio**: é caro, demorado e permanente. Você muda a estrutura do modelo em si."},
        content:`**Fine-Tuning** (ajuste fino) é outra técnica para melhorar respostas de IA. Nela, você retreina o modelo com seus proprios dados, alterando os pesos da rede neural.

**Quando usar RAG:**

        analogy:{tag:"Analogia da Cozinha",text:"Montar um RAG é como preparar uma receita. Você precisa dos **ingredientes certos** nas **quantidades certas**. Se colocar sal demais (chunk muito grande), a comida fica ruim. Se colocar de menos (chunk muito pequeno), perde o sabor. O segredo e equilibrar cada ingrediente."},
        content:`Para construir um sistema RAG, você precisa entender cinco ingredientes essenciais:

**1. Chunk Size (Tamanho do Pedaco)**

E o tamanho de cada pedaco de texto que sera armazenado. Imagine fatiar um bolo: fatias muito grandes são difíceis de comer; fatias muito pequenas se desmancham. O ideal fica entre 200 e 1000 caracteres, dependendo do tipo de documento.

**2. Chunk Overlap (Sobreposição)**

E a quantidade de texto que se repete entre um pedaco é o próximo. Isso garante que ideias que estao na fronteira entre dois pedacos não se percam. Geralmente, usa-se 10% a 20% do chunk size.

**3. Top K (Quantidade de Resultados)**

Quantos documentos o sistema deve buscar para cada pergunta. Poucos demais e você pode perder informação relevante. Muitos demais e você polui o prompt com lixo.

**4. Embeddings (Representações Numericas)**

São listas de números que representam o significado de um texto. Permitem ao computador comparar similaridade entre textos.

**5. Vector Store (Banco Vetorial)**

E o banco de dados especializado que armazena os embeddings e permite buscas por similaridade.`,

        content:`Aqui esta um dicionario completo dos termos que você vai encontrar neste guia. Volte a esta página sempre que encontrar uma palavra desconhecida.

**Termos Fundamentais:**

- **RAG** (Retrieval-Augmented Generation) — Geração Aumentada por Recuperação. Técnica que busca dados antes de gerar respostas.
- **LLM** (Large Language Model) — Modelo de Linguagem Grande. Programas como GPT, Claude, Llama que entendem e geram texto.
- **Embedding** — Representação numerica do significado de um texto. Como coordenadas GPS para ideias.

**Termos de Busca:**

- **Similaridade de Cosseno** — Métrica que mede quao parecidos são dois vetores. Quanto mais perto de 1, mais similares.
- **Top K** — Número de resultados mais relevantes retornados numa busca.
- **BM25** — Algoritmo clássico de busca por palavras-chave (tipo Google antigo).
- **Busca Hibrida** — Combina busca vetorial (significado) com BM25 (palavras-chave).

**Termos de Processamento:**

- **Chunking** — Processo de dividir documentos em pedacos menores.
- **Pipeline** — Sequencia de etapas automatizadas. Como uma linha de montagem.
- **Prompt** — Instrucao que você da para o modelo de IA.
- **Context Window** — Limite de texto que o modelo consegue processar de uma vez.
- **Alucinação** — Quando o modelo gera informação falsa com aparencia de verdadeira.`,

        title:"O que são Embeddings? O GPS das Palavras",subtitle:"Coordenadas para ideias e significados.",level:"iniciante",icon:"compass",
        analogy:{tag:"Analogia do Mapa",text:"Imagine um **mapa mágico** onde livros sobre o mesmo assunto ficam automaticamente perto uns dos outros. Um livro sobre culinaria italiana fica perto de um sobre pizza, mas longe de um sobre astronomia. **Embeddings** são as **coordenadas** nesse mapa: números que dizem ao computador onde cada texto se encontra no espaço do significado."},
        content:`**Embeddings** são listas de números (vetores) que representam o significado de um texto. Quando você transforma uma frase em embedding, o computador consegue medir matematicamente quao parecida ela e com outra frase.

**Por que isso é revolucionario?**

Antes dos embeddings, computadores só conseguiam buscar por palavras exatas. Se você buscava "cachorro", ele não encontrava documentos que falavam de "cao" ou "pet". Com embeddings, o computador entende que "cachorro", "cao" e "pet" tem significados próximos.

**Como funciona na prática?**

1. Você pega um texto: "O gato dormiu no sofa."
2. Um modelo de embedding transforma isso em números: [0.23, -0.45, 0.67, ...] (centenas de números).
3. Outro texto similar tera números próximos.
4. Textos sobre assuntos diferentes terao números distantes.

**O que são esses números?**

Cada número representa uma dimensão de significado. Alguns capturam se o texto e sobre animais, outros se e positivo ou negativo, outros se e formal ou informal. Juntos, criam uma "impressao digital" única do significado.`,
        flowSteps:["Texto original em linguagem natural","Modelo de embedding processa o texto","Gera vetor de números (ex: 384 dimensões)","Vetor e armazenado no banco vetorial","Busca compara vetores por proximidade"],
        tips:["Você não precisa entender a matemática por tras dos embeddings para usa-los.","Embeddings funcionam em qualquer idioma, inclusive português.","A qualidade do embedding depende do modelo usado - nem todos são iguais."],

      {
        title:"Como o Computador Entende Significado",subtitle:"Vetores, dimensões e proximidade.",level:"iniciante",icon:"cpu",
        analogy:{tag:"Analogia Simples",text:"Pense em cada palavra como uma **pessoa numa festa**. Pessoas com interesses similares ficam em grupos próximos: os que gostam de futebol ficam juntos, os que gostam de musica ficam em outro canto. **Vetores** são como as **coordenadas** de cada pessoa na festa. Quanto mais perto duas pessoas estao, mais parecidos são seus interesses."},
        content:`**O que é um vetor?**

Um vetor é simplesmente uma lista ordenada de números. Por exemplo: [0.5, -0.3, 0.8]. Cada número é uma **dimensão**. Modelos modernos usam 384 a 1536 dimensões.

**O exemplo clássico: Rei, Rainha, Principe**

Uma das descobertas mais fascinantes dos embeddings e que eles capturam relações:

- Vetor("Rei") - Vetor("Homem") + Vetor("Mulher") ≈ Vetor("Rainha")

Isso significa que o modelo aprendeu que a relação entre Rei e Rainha é a mesma que entre Homem e Mulher.

**Como medir similaridade?**

Se dois vetores apontam na mesma direção, os textos são similares. Se apontam em direções opostas, são diferentes. Isso é medido pela **similaridade de cosseno** - um número entre -1 e 1.

**Na prática, o que isso significa?**

Quando você pergunta "Qual é a capital da Franca?", o embedding da pergunta sera muito próximo do embedding de um documento que diz "Paris é a capital da Franca". O sistema encontra esse documento automaticamente.`,

        tips:["Nao se preocupe com a matemática - as bibliotecas fazem tudo automaticamente.","Quanto mais dimensões, mais nuances de significado o modelo captura.","Embeddings diferentes podem ter qualidades diferentes para idiomas diferentes."],

        content:`Existem varios modelos de embedding disponíveis. Cada um tem vantagens e desvantagens:

**sentence-transformers (all-MiniLM-L6-v2)**

O modelo mais popular para começar. Gratuito, roda localmente no seu computador, bom desempenho geral. Gera vetores de 384 dimensões.

        content:`A **similaridade de cosseno** é a formula matemática usada para comparar dois embeddings. Ela mede o ângulo entre dois vetores, independente do tamanho deles.

**Como interpretar o resultado:**

- **1.0** = Textos identicos em significado.
- **0.8 a 0.9** = Muito similares (provavelmente sobre o mesmo assunto).
- **0.5 a 0.7** = Alguma relação, mas não direto.
- **0.0 a 0.4** = Pouca ou nenhuma relação.
- **Negativo** = Significados opostos (raro na prática).

**Exemplo prático:**

- "O gato dormiu no sofa" vs "O felino descansou no movel" → ~0.85
- "O gato dormiu no sofa" vs "A economia cresceu 3%" → ~0.15

**A formula simplificada:**

cosine_similarity = (A . B) / (|A| x |B|)

Onde A e B são os vetores, o ponto é o produto escalar e as barras são a magnitude.`,

\`\`\`python
import chromadb
import os
from sentence_transformers import SentenceTransformer

# Configuracao
PASTA_DOCS = "./documentos"
CHUNK_SIZE = 500
CHUNK_OVERLAP = 50

# Funcao para dividir texto em chunks
def chunkar(texto, tamanho=CHUNK_SIZE, sobreposição=CHUNK_OVERLAP):
    chunks = []
    inicio = 0
    while inicio < len(texto):
        fim = inicio + tamanho
        chunk = texto[inicio:fim]
        chunks.append(chunk)
        inicio = fim - sobreposição
    return chunks

# Carregar documentos da pasta
def carregar_documentos(pasta):
    docs = []
    for arquivo in os.listdir(pasta):
        if arquivo.endswith(".txt"):
            with open(os.path.join(pasta, arquivo), "r", encoding="utf-8") as f:
                texto = f.read()
                chunks = chunkar(texto)
                for i, chunk in enumerate(chunks):
                    docs.append({
                        "texto": chunk,
                        "fonte": arquivo,
                        "chunk_id": i
                    })
    return docs

# Criar base vetorial
modelo = SentenceTransformer("all-MiniLM-L6-v2")
client = chromadb.PersistentClient(path="./base_vetorial")
colecao = client.get_or_create_collection("conhecimento")

# Processar e armazenar
documentos = carregar_documentos(PASTA_DOCS)
for doc in documentos:
    embedding = modelo.encode(doc["texto"]).tolist()
    colecao.add(
        embeddings=[embedding],
        documents=[doc["texto"]],
        metadatas=[{"fonte": doc["fonte"], "chunk": doc["chunk_id"]}],
        ids=[f"{doc['fonte']}-{doc['chunk_id']}"]
    )

print(f"Base criada com {len(documentos)} chunks!")

# Buscar
pergunta = "Qual é o assunto principal?"
emb_pergunta = modelo.encode(pergunta).tolist()
resultados = colecao.query(query_embeddings=[emb_pergunta], n_results=3)
for doc, meta in zip(resultados["documents"][0], resultados["metadatas"][0]):
    print(f"[{meta['fonte']}] {doc[:100]}...")

**Parametros importantes:**

- **chunk_size** — Tamanho de cada pedaco (em caracteres ou tokens). Típico: 200 a 1000.
- **chunk_overlap** — Quanto de sobreposição entre pedacos consecutivos. Típico: 10% a 20% do chunk_size.

Sem sobreposição, uma frase que esta na fronteira entre dois chunks pode ser cortada no meio, perdendo contexto. A sobreposição garante que informações na borda não se percam.

def chunkar(texto, tamanho=500, sobreposição=50):
    chunks = []
    inicio = 0
    while inicio < len(texto):
        fim = min(inicio + tamanho, len(texto))
        chunks.append(texto[inicio:fim])
        inicio = fim - sobreposição
        if inicio >= len(texto):
            break
    return chunks

# rag_completo.py
# pip install chromadb sentence-transformers openai pdfplumber

import os
import chromadb
from sentence_transformers import SentenceTransformer
from openai import OpenAI

# ─── Configuracao ───
CHUNK_SIZE = 500
CHUNK_OVERLAP = 50
TOP_K = 5
PASTA_DOCS = "./documentos"

# ─── Inicializacao ───
modelo_emb = SentenceTransformer("all-MiniLM-L6-v2")
client_db = chromadb.PersistentClient(path="./rag_db")
colecao = client_db.get_or_create_collection("base")
client_llm = OpenAI(api_key=os.getenv("OPENAI_API_KEY"))

# ─── Funcoes ───
def chunkar(texto, tam=CHUNK_SIZE, over=CHUNK_OVERLAP):
    chunks, inicio = [], 0
    while inicio < len(texto):
        chunks.append(texto[inicio:inicio+tam])
        inicio += tam - over
    return chunks

def indexar(pasta):
    for arq in os.listdir(pasta):
        if arq.endswith(".txt"):
            with open(os.path.join(pasta, arq), encoding="utf-8") as f:
                chunks = chunkar(f.read())
            for i, c in enumerate(chunks):
                colecao.add(
                    ids=[f"{arq}-{i}"],
                    embeddings=[modelo_emb.encode(c).tolist()],
                    documents=[c],
                    metadatas=[{"fonte": arq}]
                )
    print(f"Indexados {colecao.count()} chunks.")

def perguntar(pergunta):
    emb = modelo_emb.encode(pergunta).tolist()
    res = colecao.query(query_embeddings=[emb], n_results=TOP_K)
    contexto = "\\n---\\n".join(res["documents"][0])
    prompt = f"""Responda baseado APENAS no contexto.
Se não souber, diga 'Nao encontrei nos documentos.'

CONTEXTO:
{contexto}

PERGUNTA: {pergunta}
RESPOSTA:"""
    r = client_llm.chat.completions.create(
        model="gpt-4o-mini",
        messages=[{"role":"user","content":prompt}],
        temperature=0.2
    )
    return r.choices[0].message.content

# ─── Execução ───
if __name__ == "__main__":
    if colecao.count() == 0:
        indexar(PASTA_DOCS)
    while True:
        p = input("\\nPergunta (ou 'sair'): ")
        if p.lower() == "sair":
            break
        print("\\nResposta:", perguntar(p))

    chave = f"chat:{session_id}"

import json
from datetime import datetime

class MemoriaConversa:
    def __init__(self, redis_client=None, ttl=3600, max_msgs=10):
        self.redis = redis_client
        self.ttl = ttl
        self.max_msgs = max_msgs
        self.local = {}  # fallback se não tiver Redis

    def _chave(self, session_id):
        return f"memória:{session_id}"

    def adicionar(self, session_id, role, content):
        msg = json.dumps({
            "role": role,
            "content": content,
            "timestamp": datetime.now().isoformat()
        })
        if self.redis:
            self.redis.rpush(self._chave(session_id), msg)
            self.redis.ltrim(self._chave(session_id), -self.max_msgs, -1)
            self.redis.expire(self._chave(session_id), self.ttl)
        else:
            if session_id not in self.local:
                self.local[session_id] = []
            self.local[session_id].append(msg)
            self.local[session_id] = self.local[session_id][-self.max_msgs:]

    def obter(self, session_id):
        if self.redis:
            msgs = self.redis.lrange(self._chave(session_id), 0, -1)
        else:
            msgs = self.local.get(session_id, [])
        return [json.loads(m) for m in msgs]

    def limpar(self, session_id):
        if self.redis:
            self.redis.delete(self._chave(session_id))
        else:
            self.local.pop(session_id, None)

        content:`**GraphRAG** combina RAG vetorial com grafos de conhecimento. Em vez de apenas buscar documentos similares, ele entende e navega as relações entre conceitos.

**Quando usar GraphRAG?**

- Quando as relações entre entidades são tao importantes quanto os fatos em si.
- Perguntas como "Quais empresas são subsidiarias da empresa X e quais produtos elas fabricam?"
- Dominios com hierarquias complexas (organizacoes, legislacao, biologia).

**Componentes:**

**Busca Vetorial** (semântica): Encontra documentos com significado similar, mesmo sem as mesmas palavras. Boa para perguntas conceituais.

**Busca BM25** (keywords): Encontra documentos com as mesmas palavras exatas. Boa para termos técnicos, nomes proprios, códigos.

**Quando a busca hibrida é melhor?**

- "Qual a dosagem do medicamento ABC-123?" → BM25 encontra "ABC-123" exato; vetorial pode errar.
- "Qual remedio tomar para dor de cabeca?" → Vetorial entende a intenção; BM25 precisa das palavras exatas.
- Híbrido encontra nos DOIS casos.

**Reciprocal Rank Fusion (RRF):**

Algoritmo que combina os rankings das duas buscas:

\`\`\`python
def rrf(resultados_vetorial, resultados_bm25, k=60):
    scores = {}
    for rank, doc_id in enumerate(resultados_vetorial):
        scores[doc_id] = scores.get(doc_id, 0) + 1 / (k + rank + 1)
    for rank, doc_id in enumerate(resultados_bm25):
        scores[doc_id] = scores.get(doc_id, 0) + 1 / (k + rank + 1)
    return sorted(scores.items(), key=lambda x: x[1], reverse=True)

\`\`\`python
def gerar_variantes(pergunta, client_llm, n=4):
    prompt = f"""Gere {n} reformulações diferentes desta pergunta,
mantendo o mesmo significado mas usando palavras diferentes:
Pergunta: "{pergunta}"
Retorne uma por linha, sem numeracao."""
    r = client_llm.chat.completions.create(
        model="gpt-4o-mini",
        messages=[{"role":"user","content":prompt}],
        temperature=0.7
    )
    variantes = r.choices[0].message.content.strip().split("\n")
    return [pergunta] + variantes[:n]

def rag_fusion(pergunta, colecao, modelo_emb, client_llm):
    # Gerar variantes
    variantes = gerar_variantes(pergunta, client_llm)

    # Buscar para cada variante
    todos_resultados = {}
    for var in variantes:
        emb = modelo_emb.encode(var).tolist()
        res = colecao.query(query_embeddings=[emb], n_results=5)
        for i, doc_id in enumerate(res["ids"][0]):
            if doc_id not in todos_resultados:
                todos_resultados[doc_id] = {"doc": res["documents"][0][i], "score": 0}
            todos_resultados[doc_id]["score"] += 1 / (60 + i + 1)

    # Ordenar por score combinado
    ordenados = sorted(todos_resultados.values(), key=lambda x: x["score"], reverse=True)
    return [r["doc"] for r in ordenados[:5]]

def hyde_busca(pergunta, colecao, modelo_emb, client_llm):
    # Gerar documento hipotetico
    prompt = f"""Escreva um paragrafo curto respondendo esta pergunta
como se fosse um trecho de documento técnico:
"{pergunta}"
Não se preocupe com precisao - gere algo plausivel."""

    r = client_llm.chat.completions.create(
        model="gpt-4o-mini",
        messages=[{"role":"user","content":prompt}],
        temperature=0.5
    )
    doc_hipotetico = r.choices[0].message.content

    # Buscar com embedding do documento hipotetico
    emb = modelo_emb.encode(doc_hipotetico).tolist()
    resultados = colecao.query(query_embeddings=[emb], n_results=5)
    return resultados["documents"][0]

function norm(s){return s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^\w\s]/g,"")}
function advancedSearch(query,secs){
  if(!query||!query.trim())return[];
  const qn=norm(query);const qTokens=qn.split(/\s+/).filter(t=>t.length>1);
  if(!qTokens.length)return[];
  // expand synonyms
  const expanded=new Set(qTokens);
  const synMatches=[];
  for(const group of SYNONYMS){const gn=group.map(norm);for(const tok of qTokens){if(gn.some(g=>g.includes(tok)||tok.includes(g))){gn.forEach(g=>synMatches.push(g));break}}}
  // detect intents
  const intents=[];
  for(const intent of INTENT_MAP){if(intent.keywords.some(k=>qn.includes(norm(k)))){intents.push(intent)}}
  const results=[];
  const WEIGHTS={title:30,subtitle:15,content:5,tips:3,steps:4,analogy:8,prompt:6};
  for(let si=0;si<secs.length;si++){
    const sec=secs[si];
    for(let ci=0;ci<sec.cards.length;ci++){
      const card=sec.cards[ci];let score=0;let matchType="partial";
      const fields={title:norm(card.title||""),subtitle:norm(card.subtitle||""),content:norm(card.content||""),tips:norm((card.tips||[]).join(" ")),steps:norm((card.steps||[]).concat(card.flowSteps||[]).join(" ")),analogy:norm(card.analogy?card.analogy.text:""),prompt:norm(card.prompt||"")};
      const allText=Object.values(fields).join(" ");
      // exact phrase match
      if(allText.includes(qn)){score+=20;matchType="exact"}
      // per-field token matching
      for(const[fk,fv]of Object.entries(fields)){
        const w=WEIGHTS[fk]||5;
        for(const tok of qTokens){if(fv.includes(tok))score+=w}
        for(const syn of synMatches){if(fv.includes(syn))score+=Math.round(w*0.6);if(matchType==="partial")matchType="synonym"}
      }
      // all words present bonus
      if(qTokens.every(t=>allText.includes(t)))score+=10;
      // intent match
      for(const intent of intents){
        if(intent.type==="steps"&&(card.flowSteps||card.steps)){score+=15;matchType=matchType==="exact"?matchType:"intent"}
        if(intent.type==="comparison"&&(card.tableData||card.comparisonTable||card.relationshipRows)){score+=15;matchType=matchType==="exact"?matchType:"intent"}
        if(intent.type==="code"&&card.content&&card.content.includes("```")){score+=15;matchType=matchType==="exact"?matchType:"intent"}
        if(intent.type==="security"&&sec.id==="seguranca"){score+=15;matchType=matchType==="exact"?matchType:"intent"}
        if(intent.type==="level"&&card.level===intent.level){score+=15;matchType=matchType==="exact"?matchType:"intent"}
      }
      if(score>0){
        const snippet=(card.content||card.subtitle||"").substring(0,80);
        results.push({sectionId:sec.id,sectionTitle:sec.title,cardTitle:card.title,cardIndex:ci,cardLevel:card.level,sectionIdx:si,score,matchType,snippet});
      }
    }
  }
  results.sort((a,b)=>b.score-a.score);
  return results.slice(0,15);
}

  while(i<lines.length){const line=lines[i];

      blocks.push(<div key={blocks.length} style={{margin:"12px 0",borderRadius:10,overflow:"hidden",border:`1px solid ${t.borderLine}`,background:t.bgSurface}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 12px",background:t.bgRaised,borderBottom:`1px solid ${t.borderLine}`}}><span style={{fontFamily:"'JetBrains Mono', monospace",fontSize:11,color:t.fgMuted,textTransform:"uppercase"}}>{lang||"code"}</span><button onClick={()=>copyText(code,codeId)} style={{background:"none",border:"none",color:copiedId===codeId?"#4ade80":t.fgSecondary,cursor:"pointer",display:"flex",alignItems:"center",gap:4,fontSize:11,fontFamily:"'JetBrains Mono', monospace"}}>{copiedId===codeId?<><Icon name="check" size={12}/> Copiado!</>:<><Icon name="copy" size={12}/> Copiar</>}</button></div><pre style={{margin:0,padding:"12px 16px",overflowX:"auto",fontSize:13,lineHeight:1.6,fontFamily:"'JetBrains Mono', monospace",color:t.fgPrimary}}>{code}</pre></div>);
    }else if(line.trim()===""){blocks.push(<div key={blocks.length} style={{height:8}}/>);i++}
    else if(line.startsWith("- ")){const items=[];while(i<lines.length&&lines[i].startsWith("- ")){items.push(lines[i].slice(2));i++}blocks.push(<ul key={blocks.length} style={{margin:"8px 0",paddingLeft:0,listStyle:"none"}}>{items.map((item,j)=>(<li key={j} style={{display:"flex",gap:10,marginBottom:6,fontSize:14,lineHeight:1.6,color:t.fgSecondary}}><span style={{color:t.fgAccent,marginTop:2,flexShrink:0}}>&#8226;</span><span>{renderInline(item)}</span></li>))}</ul>)}
    else if(/^\d+\.\s/.test(line)){const items=[];while(i<lines.length&&/^\d+\.\s/.test(lines[i])){items.push(lines[i].replace(/^\d+\.\s/,""));i++}blocks.push(<ol key={blocks.length} style={{margin:"8px 0",paddingLeft:0,listStyle:"none"}}>{items.map((item,j)=>(<li key={j} style={{display:"flex",gap:10,marginBottom:8,fontSize:14,lineHeight:1.6,color:t.fgSecondary}}><span style={{color:t.fgAccent,fontFamily:"'JetBrains Mono', monospace",fontSize:12,fontWeight:600,minWidth:22,height:22,borderRadius:"50%",background:t.bgAccentSubtle,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginTop:1}}>{j+1}</span><span>{renderInline(item)}</span></li>))}</ol>)}
    else if(line.match(/^\*\*[^*]+\*\*:?\s*$/)||line.match(/^\*\*[^*]+:\*\*\s*$/)){blocks.push(<h4 key={blocks.length} style={{margin:"16px 0 6px",fontSize:15,fontWeight:600,color:t.fgPrimary,fontFamily:"'Sora', sans-serif"}}>{renderInline(line)}</h4>);i++}
    else{blocks.push(<p key={blocks.length} style={{margin:"6px 0",fontSize:14,lineHeight:1.7,color:t.fgSecondary}}>{renderInline(line)}</p>);i++}
  }
  return <div>{blocks}</div>;
}

      {showOnboarding&&(<div style={{position:"fixed",inset:0,zIndex:100,display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(0,0,0,0.7)",backdropFilter:"blur(8px)"}}><div style={{background:t.bgRaised,borderRadius:20,padding:"32px 28px",maxWidth:420,width:"90%",border:`1px solid ${t.borderLine}`,animation:"scaleIn 0.3s ease"}}><div style={{textAlign:"center"}}><div style={{width:56,height:56,borderRadius:16,background:`linear-gradient(135deg, ${t.bgAccent}, ${t.bgAccentHover})`,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 16px",color:t.fgOnAccent}}><Icon name={onboardingSteps[onboardingStep].icon} size={26}/></div><h2 style={{fontSize:20,fontWeight:700,fontFamily:"'Sora', sans-serif",marginBottom:8}}>{onboardingSteps[onboardingStep].title}</h2><p style={{fontSize:14,color:t.fgSecondary,lineHeight:1.6}}>{onboardingSteps[onboardingStep].desc}</p></div><div style={{display:"flex",justifyContent:"center",gap:6,margin:"20px 0 16px"}}>{onboardingSteps.map((_,i)=>(<div key={i} style={{width:8,height:8,borderRadius:"50%",background:i===onboardingStep?t.fgAccent:t.borderLine,transition:"background 0.3s"}}/>))}</div><div style={{display:"flex",justifyContent:"space-between",gap:10}}><button onClick={()=>setShowOnboarding(false)} style={{flex:1,padding:"10px",borderRadius:10,border:`1px solid ${t.borderLine}`,background:"transparent",color:t.fgSecondary,cursor:"pointer",fontSize:13,fontWeight:500}}>Pular</button><button onClick={()=>{if(onboardingStep<2)setOnboardingStep(onboardingStep+1);else setShowOnboarding(false)}} style={{flex:1,padding:"10px",borderRadius:10,border:"none",background:`linear-gradient(135deg, ${t.bgAccent}, ${t.bgAccentHover})`,color:t.fgOnAccent,cursor:"pointer",fontSize:13,fontWeight:600}}>{onboardingStep<2?"Próximo":"Começar!"}</button></div></div></div>)}

      <header style={{position:"fixed",top:0,left:0,right:0,height:56,zIndex:50,display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 20px",background:`${t.bgSurface}ee`,backdropFilter:"blur(16px)",borderBottom:`1px solid ${t.borderLine}`}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}><div style={{width:32,height:32,borderRadius:10,background:`linear-gradient(135deg, ${t.bgAccent}, ${t.bgAccentHover})`,display:"flex",alignItems:"center",justifyContent:"center",color:t.fgOnAccent}}><Icon name="brain" size={17}/></div><span style={{fontFamily:"'Sora', sans-serif",fontWeight:700,fontSize:15,color:t.fgPrimary}}>Academia <span style={{color:t.fgAccent}}>RAG</span></span></div>
        <div style={{display:"flex",alignItems:"center",gap:12}}><div style={{fontSize:11,fontFamily:"'JetBrains Mono', monospace",color:t.fgMuted}}>{globalProgress.percent}%</div><div style={{width:60,height:4,borderRadius:2,background:t.borderLine,overflow:"hidden"}}><div style={{width:`${globalProgress.percent}%`,height:"100%",borderRadius:2,background:`linear-gradient(90deg, ${t.bgAccent}, ${t.bgAccentHover})`,transition:"width 0.5s ease"}}/></div><button onClick={toggleTheme} style={{background:"none",border:"none",cursor:"pointer",color:t.fgSecondary,padding:4,display:"flex",alignItems:"center"}}><Icon name={theme==="dark"?"sun":"moon"} size={18}/></button></div>
      </header>

      {showHero&&(<section style={{minHeight:"85vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"80px 20px 40px",position:"relative",overflow:"hidden",textAlign:"center"}}>
        <div style={{position:"absolute",width:400,height:400,borderRadius:"50%",background:"radial-gradient(circle, rgba(226,192,116,0.06) 0%, transparent 70%)",top:"10%",left:"10%",animation:"orbFloat 15s ease-in-out infinite"}}/>
        <div style={{position:"absolute",width:300,height:300,borderRadius:"50%",background:"radial-gradient(circle, rgba(226,192,116,0.04) 0%, transparent 70%)",bottom:"10%",right:"15%",animation:"orbFloat 20s ease-in-out infinite reverse"}}/>
        <div style={{position:"relative",zIndex:1,animation:"fadeUp 0.6s ease both"}}>
          <div style={{display:"inline-flex",alignItems:"center",gap:8,marginBottom:20,padding:"6px 14px",borderRadius:999,border:`1px solid ${t.borderAccent}`,background:t.bgAccentSubtle}}><div style={{width:16,height:2,background:t.fgAccent,borderRadius:1}}/><span style={{fontSize:11,fontFamily:"'JetBrains Mono', monospace",textTransform:"uppercase",color:t.fgAccent,fontWeight:600,letterSpacing:"0.1em"}}>Guia Completo e Interativo</span></div>
          <h1 style={{fontSize:"clamp(28px, 6vw, 48px)",fontWeight:800,fontFamily:"'Sora', sans-serif",lineHeight:1.15,marginBottom:16,background:`linear-gradient(135deg, ${t.fgPrimary}, ${t.fgAccent})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>Academia RAG</h1>
          <p style={{fontSize:"clamp(14px, 2.5vw, 18px)",color:t.fgSecondary,maxWidth:560,margin:"0 auto 28px",lineHeight:1.6}}>Domine <strong style={{color:t.fgAccent}}>Retrieval-Augmented Generation</strong> do zero ao avançado. Explicado para qualquer pessoa, com analogias do dia a dia e código Python funcional.</p>
          <div style={{display:"flex",flexWrap:"wrap",justifyContent:"center",gap:16,marginBottom:32}}>
            {[{n:"12",l:"Seções"},{n:"70+",l:"Tutoriais"},{n:"Prontos",l:"Prompts"},{n:"4",l:"Níveis"}].map((m,i)=>(<div key={i} style={{textAlign:"center"}}><div style={{fontSize:22,fontWeight:700,fontFamily:"'Sora', sans-serif",color:t.fgAccent}}>{m.n}</div><div style={{fontSize:11,fontFamily:"'JetBrains Mono', monospace",color:t.fgMuted,textTransform:"uppercase"}}>{m.l}</div></div>))}
          </div>
          <button onClick={()=>setShowHero(false)} style={{padding:"14px 36px",borderRadius:12,border:"none",cursor:"pointer",background:`linear-gradient(135deg, ${t.bgAccent}, ${t.bgAccentHover})`,color:t.fgOnAccent,fontSize:15,fontWeight:700,fontFamily:"'Sora', sans-serif",boxShadow:"0 0 30px rgba(226,192,116,0.2)",transition:"transform 0.2s, box-shadow 0.2s"}} onMouseEnter={e=>{e.target.style.transform="translateY(-2px)";e.target.style.boxShadow="0 0 40px rgba(226,192,116,0.3)"}} onMouseLeave={e=>{e.target.style.transform="translateY(0)";e.target.style.boxShadow="0 0 30px rgba(226,192,116,0.2)"}}>Começar o Guia</button>
        </div>
      </section>)}

      {!showHero&&(<main style={{maxWidth:840,margin:"0 auto",padding:"72px 16px 40px"}}>
        <div style={{position:"relative",marginBottom:24}}>
          <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",borderRadius:12,background:t.bgSurface,border:`1px solid ${searchFocused?t.borderFocus:t.borderLine}`,transition:"border 0.3s"}}><Icon name="search" size={16} style={{color:t.fgMuted,flexShrink:0}}/><input value={searchQuery} onChange={e=>setSearchQuery(e.target.value)} onFocus={()=>setSearchFocused(true)} onBlur={()=>setTimeout(()=>setSearchFocused(false),200)} placeholder="Buscar tutoriais, comandos, termos..." style={{flex:1,background:"none",border:"none",outline:"none",color:t.fgPrimary,fontSize:14,fontFamily:"'DM Sans', sans-serif"}}/>{searchQuery&&<button onClick={()=>setSearchQuery("")} style={{background:"none",border:"none",cursor:"pointer",color:t.fgMuted,padding:2}}><Icon name="x" size={14}/></button>}</div>
          {searchFocused&&!searchQuery&&(<div style={{position:"absolute",top:"100%",left:0,right:0,zIndex:40,marginTop:4,borderRadius:12,background:t.bgRaised,border:`1px solid ${t.borderLine}`,boxShadow:"0 8px 30px rgba(0,0,0,0.3)",padding:"14px"}}><div style={{fontSize:10,fontFamily:"'JetBrains Mono', monospace",textTransform:"uppercase",color:t.fgMuted,fontWeight:600,marginBottom:8}}>Sugestões populares</div><div style={{display:"flex",flexWrap:"wrap",gap:6}}>{SEARCH_SUGGESTIONS.map((s,i)=>(<button key={i} onMouseDown={e=>{e.preventDefault();setSearchQuery(s)}} className="search-chip" style={{color:t.fgSecondary,background:t.bgAccentSubtle,border:`1px solid ${t.borderLine}`,padding:"5px 12px",borderRadius:999,fontSize:12,cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}}>{s}</button>))}</div></div>)}
          {searchFocused&&searchQuery&&searchResults.length>0&&(<div style={{position:"absolute",top:"100%",left:0,right:0,zIndex:40,marginTop:4,borderRadius:12,background:t.bgRaised,border:`1px solid ${t.borderLine}`,boxShadow:"0 8px 30px rgba(0,0,0,0.3)",maxHeight:360,overflowY:"auto"}}>{searchResults.map((r,i)=>{const matchColors={exact:{bg:"rgba(74,222,128,0.15)",fg:"#4ade80"},intent:{bg:"rgba(96,165,250,0.15)",fg:"#60a5fa"},synonym:{bg:"rgba(192,132,252,0.15)",fg:"#c084fc"},partial:{bg:"rgba(250,204,21,0.15)",fg:"#facc15"}};const mc=matchColors[r.matchType]||matchColors.partial;return(<button key={i} onClick={()=>{setActiveSection(r.sectionIdx);setExpandedCard(`${r.sectionId}-${r.cardIndex}`);setSearchQuery("");setSearchFocused(false)}} style={{width:"100%",display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 14px",background:"none",border:"none",borderBottom:`1px solid ${t.borderLine}`,cursor:"pointer",textAlign:"left"}}><div style={{flex:1,minWidth:0}}><div style={{fontSize:13,fontWeight:500,color:t.fgPrimary}}>{r.cardTitle}</div><div style={{fontSize:11,color:t.fgMuted}}>{r.sectionTitle}{r.snippet&&<span style={{marginLeft:6,opacity:0.7}}> — {r.snippet.substring(0,50)}...</span>}</div></div><div style={{display:"flex",alignItems:"center",gap:4,flexShrink:0}}><span className="match-badge" style={{background:mc.bg,color:mc.fg,padding:"1px 6px",borderRadius:4,fontSize:9,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.05em",fontFamily:"'JetBrains Mono',monospace"}}>{r.matchType}</span><LevelBadge level={r.cardLevel}/></div></button>)})}</div>)}
          {searchFocused&&searchQuery&&searchResults.length===0&&(<div style={{position:"absolute",top:"100%",left:0,right:0,zIndex:40,marginTop:4,borderRadius:12,background:t.bgRaised,border:`1px solid ${t.borderLine}`,boxShadow:"0 8px 30px rgba(0,0,0,0.3)",padding:"14px",textAlign:"center"}}><div style={{fontSize:13,color:t.fgMuted,marginBottom:8}}>Nenhum resultado encontrado.</div><div style={{fontSize:11,color:t.fgMuted,marginBottom:8}}>Tente buscar por:</div><div style={{display:"flex",flexWrap:"wrap",gap:6,justifyContent:"center"}}>{["embedding","chunking","RAG clássico","agentes","segurança"].map((s,i)=>(<button key={i} onMouseDown={e=>{e.preventDefault();setSearchQuery(s)}} style={{color:t.fgAccent,background:t.bgAccentSubtle,border:`1px solid ${t.borderAccent}`,padding:"4px 10px",borderRadius:999,fontSize:11,cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}}>{s}</button>))}</div></div>)}
        </div>

        <div style={{display:"flex",gap:6,flexWrap:"wrap",paddingBottom:12,marginBottom:8}}>
          {sections.map((sec,i)=>{const active=i===activeSection;return(<button key={sec.id} onClick={()=>{setActiveSection(i);setExpandedCard(null)}} style={{display:"flex",alignItems:"center",gap:6,padding:"8px 14px",borderRadius:10,border:`1px solid ${active?t.borderAccent:"transparent"}`,background:active?t.bgAccentSubtle:"transparent",color:active?t.fgAccent:t.fgSecondary,cursor:"pointer",fontSize:13,fontWeight:active?600:400,fontFamily:"'DM Sans', sans-serif",transition:"all 0.2s"}}><Icon name={sec.icon} size={15}/>{sec.title}</button>)})}
        </div>

        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:20,flexWrap:"wrap"}}>
          <span style={{fontSize:10,fontFamily:"'JetBrains Mono', monospace",textTransform:"uppercase",color:t.fgMuted,fontWeight:600}}>Nível:</span>
          {[null,"iniciante","intermediario","avancado","expert"].map(lvl=>{const active=lvl===activeLevel;const c=lvl?LEVEL_COLORS[lvl]:null;return(<button key={lvl||"all"} onClick={()=>setActiveLevel(active?null:lvl)} style={{padding:"4px 10px",borderRadius:999,fontSize:11,fontWeight:500,fontFamily:"'JetBrains Mono', monospace",cursor:"pointer",background:active?(c?c.bg:t.bgAccentSubtle):"transparent",color:active?(c?c.fg:t.fgAccent):t.fgMuted,border:`1px solid ${active?(c?c.border:t.borderAccent):t.borderLine}`,transition:"all 0.2s"}}>{lvl?LEVEL_LABELS[lvl]:"Todos"}</button>)})}
        </div>

        <div style={{marginBottom:20,animation:"fadeUp 0.3s ease both"}}>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}><div style={{height:2,width:24,background:t.fgAccent,borderRadius:1}}/><span style={{fontSize:10,fontFamily:"'JetBrains Mono', monospace",textTransform:"uppercase",color:t.fgAccent,fontWeight:600}}>Seção {String(activeSection+1).padStart(2,"0")}</span></div>
          <div style={{display:"flex",alignItems:"center",gap:12}}><div style={{width:40,height:40,borderRadius:12,background:`linear-gradient(135deg, ${t.bgAccent}, ${t.bgAccentHover})`,display:"flex",alignItems:"center",justifyContent:"center",color:t.fgOnAccent}}><Icon name={currentSection.icon} size={20}/></div><div><h2 style={{fontSize:20,fontWeight:700,fontFamily:"'Sora', sans-serif"}}>{currentSection.title}</h2><p style={{fontSize:13,color:t.fgSecondary}}>{currentSection.description}</p></div></div>
          <div style={{marginTop:12,display:"flex",alignItems:"center",gap:10}}><div style={{flex:1,height:4,borderRadius:2,background:t.borderLine,overflow:"hidden"}}><div style={{width:`${sectionProgress.percent}%`,height:"100%",borderRadius:2,background:`linear-gradient(90deg, ${t.bgAccent}, ${t.bgAccentHover})`,transition:"width 0.5s ease"}}/></div><span style={{fontSize:11,fontFamily:"'JetBrains Mono', monospace",color:t.fgMuted}}>{sectionProgress.viewed}/{sectionProgress.total}</span></div>
        </div>

        {filteredCards.length===0?(<div style={{textAlign:"center",padding:40,color:t.fgMuted}}><p style={{fontSize:14}}>Nenhum card encontrado para o nível selecionado.</p><button onClick={()=>setActiveLevel(null)} style={{marginTop:10,padding:"8px 16px",borderRadius:8,border:`1px solid ${t.borderAccent}`,background:"transparent",color:t.fgAccent,cursor:"pointer",fontSize:13}}>Mostrar todos</button></div>):(filteredCards.map((card,i)=>{const originalIdx=currentSection.cards.indexOf(card);return(<div key={`${currentSection.id}-${originalIdx}`} style={{animation:`fadeUp 0.4s ease both`,animationDelay:`${i*50}ms`}}><ExpandableCard card={card} sectionId={currentSection.id} cardIdx={originalIdx} state={state}/></div>)}))}

        <footer style={{marginTop:48,paddingTop:20,borderTop:`1px solid ${t.borderLine}`,textAlign:"center"}}><p style={{fontSize:12,color:t.fgMuted,lineHeight:1.8}}>Academia <strong style={{color:t.fgAccent}}>RAG</strong> — Super Inteligenc<strong style={{color:t.fgAccent}}>[IA]</strong></p><p style={{fontSize:11,color:t.fgMuted,marginTop:4}}>Guia educacional interativo sobre Retrieval-Augmented Generation. v1.0</p></footer>
      </main>)}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
